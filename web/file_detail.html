<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Key}}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #f5f5f5; padding: 2rem; }
        .back { display: inline-block; margin-bottom: 1.5rem; font-size: 0.875rem; color: #2563eb; text-decoration: none; }
        .back:hover { text-decoration: underline; }
        .card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; max-width: 800px; }
        .meta { padding: 1rem 1.5rem; border-bottom: 1px solid #e5e7eb; }
        .meta h1 { font-size: 1rem; font-weight: 600; word-break: break-all; margin-bottom: 0.5rem; }
        .meta p { font-size: 0.8rem; color: #6b7280; }
        .preview { padding: 1.5rem; display: flex; justify-content: center; background: #f9fafb; }
        .preview img { max-width: 100%; max-height: 600px; border-radius: 4px; object-fit: contain; }
        .preview iframe { width: 100%; height: 600px; border: none; border-radius: 4px; }
    </style>
</head>
<body>
    <a class="back" href="/">← Back to files</a>
    <div class="card">
        <div class="meta">
            <h1>{{.Key}}</h1>
            <p>{{.Size}} bytes &nbsp;·&nbsp; {{.LastModified.Format "2006-01-02 15:04:05"}}</p>
        </div>
        <div class="preview">
            {{if eq .ContentType "application/pdf"}}
                <iframe src="{{.URL}}"></iframe>
            {{else}}
                <img src="{{.URL}}" alt="{{.Key}}">
            {{end}}
        </div>
    </div>
</body>
</html>
