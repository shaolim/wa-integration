<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Files</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #f5f5f5; padding: 2rem; }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; }
        th { background: #f9fafb; text-align: left; padding: 0.75rem 1rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; border-bottom: 1px solid #e5e7eb; }
        td { padding: 0.75rem 1rem; font-size: 0.875rem; color: #374151; border-bottom: 1px solid #f3f4f6; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f9fafb; }
        .empty { text-align: center; padding: 3rem; color: #9ca3af; }
    </style>
</head>
<body>
    <h1>Files</h1>
    <table>
        <thead>
            <tr>
                <th>Key</th>
                <th>Size</th>
                <th>Last Modified</th>
            </tr>
        </thead>
        <tbody>
            {{if .Files}}
                {{range .Files}}
                <tr>
                    <td><a href="/file?key={{.Key}}">{{.Key}}</a></td>
                    <td>{{.Size}} bytes</td>
                    <td>{{.LastModified.Format "2006-01-02 15:04:05"}}</td>
                </tr>
                {{end}}
            {{else}}
                <tr><td colspan="3" class="empty">No files found.</td></tr>
            {{end}}
        </tbody>
    </table>
</body>
</html>
